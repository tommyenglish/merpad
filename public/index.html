<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mermaid Viewer</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>

  <div id="toolbar">
	<strong class="title">Merpad &mdash; <em class="subtitle">A minimalist mermaid editor &amp; viewer for quick image capture</em></strong>

	<div class="controls">
		<div class="group">
			<label for="themeSelect">Theme:</label>
			<select id="themeSelect">
			  <option value="default">Default</option>
			  <option value="dark">Dark</option>
			  <option value="forest">Forest</option>
			  <option value="neutral">Neutral</option>
			  <option value="vibrant">Vibrant (custom)</option>
			  <option value="print">Print (B/W)</option>
			</select>

			<label for="layoutSelect">Layout:</label>
			<select id="layoutSelect">
			  <option value="dagre">Hierarchical (Dagre)</option>
			  <option value="elk-layered">Adaptive (ELK layered)</option>
			  <option value="elk-mrtree">Tree (ELK mrtree)</option>
			  <option value="elk-radial">Radial (ELK radial)</option>
			</select>
		</div>	

		<div class="group">
			<button id="zoomIn">＋</button>
			<button id="zoomOut">−</button>
			<button id="zoomReset">100 %</button>
			<span id="dims"></span>
		</div>

		<div class="group">
			<button id="layoutToggle" title="Toggle horizontal/vertical layout">⇄</button>
		</div>

		<div class="group">
			<button id="btnSvg">SVG…</button>
			<button id="btnPng">PNG…</b…utton>
			<button id="btnCopy">Copy PNG</button>
		</div>

		<div class="group">
			<button id="btnOpen">Open…</button>
			<button id="btnSave">Save…</button>
			<input  id="fileOpen" type="file" accept=".mmd,.txt" hidden>
		</div>
	</div>
  </div>

  <div id="tabBar">
    <div id="tabList">
      <button id="btnNewTab" title="New tab">+</button>
    </div>
  </div>

  <div id="splitContainer">
    <div id="editorWrapper">
      <div id="lineNumbers"></div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="templatePicker" class="template-picker hidden">
        <h3>Start with a template or type your own diagram</h3>
        <div class="template-grid">
          <div class="template-card" data-template="flowchart">
            <div class="template-icon">🌊</div>
            <div class="template-name">Flowchart</div>
          </div>
          <div class="template-card" data-template="sequence">
            <div class="template-icon">↔️</div>
            <div class="template-name">Sequence</div>
          </div>
          <div class="template-card" data-template="gantt">
            <div class="template-icon">📅</div>
            <div class="template-name">Gantt</div>
          </div>
          <div class="template-card" data-template="class">
            <div class="template-icon">📦</div>
            <div class="template-name">Class</div>
          </div>
          <div class="template-card" data-template="erDiagram">
            <div class="template-icon">🗃️</div>
            <div class="template-name">ER Diagram</div>
          </div>
          <div class="template-card" data-template="state">
            <div class="template-icon">🔄</div>
            <div class="template-name">State</div>
          </div>
          <div class="template-card" data-template="pie">
            <div class="template-icon">🥧</div>
            <div class="template-name">Pie Chart</div>
          </div>
          <div class="template-card" data-template="gitGraph">
            <div class="template-icon">🌳</div>
            <div class="template-name">Git Graph</div>
          </div>
          <div class="template-card" data-template="journey">
            <div class="template-icon">🗺️</div>
            <div class="template-name">Journey</div>
          </div>
        </div>
        <button id="btnSkipTemplate" class="skip-template">Skip - Start blank</button>
      </div>
    </div>
    <div id="divider"></div>
    <div id="diagram"></div>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
