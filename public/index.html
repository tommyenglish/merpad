<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mermaid Viewer</title>
  <link rel="stylesheet" href="viewer.css" />
  <link rel="stylesheet" href="fontawesome/all.min.css" />
</head>
<body>

  <div id="toolbar">
	<strong class="title">Merpad &mdash; <em class="subtitle">A minimalist mermaid editor &amp; viewer for quick image capture</em></strong>

	<div class="controls">
		<div class="group">
			<label for="themeSelect">Theme:</label>
			<select id="themeSelect">
			  <option value="default">Default</option>
			  <option value="dark">Dark</option>
			  <option value="forest">Forest</option>
			  <option value="neutral">Neutral</option>
			  <option value="vibrant">Vibrant (custom)</option>
			  <option value="print">Print (B/W)</option>
			</select>

			<label for="layoutSelect">Layout:</label>
			<select id="layoutSelect">
			  <option value="dagre">Hierarchical (Dagre)</option>
			  <option value="elk-layered">Adaptive (ELK layered)</option>
			  <option value="elk-mrtree">Tree (ELK mrtree)</option>
			  <option value="elk-radial">Radial (ELK radial)</option>
			</select>
			<button id="layoutToggle" title="Toggle horizontal/vertical layout"><i class="fa-solid fa-table-columns"></i></button>
		</div>

		<div class="group">
			<button id="zoomIn" title="Zoom in"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
			<button id="zoomOut" title="Zoom out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
			<button id="zoomReset" title="Reset zoom"><i class="fa-solid fa-expand"></i></button>
			<input id="dimW" type="number" min="1" title="Width (px)">
			<span class="dim-sep">&times;</span>
			<input id="dimH" type="number" min="1" title="Height (px)">
			<span class="dim-unit">px</span>
		</div>

		<div class="group">
			<button id="btnSvg" title="Export as SVG"><i class="fa-solid fa-image"></i></button>
			<button id="btnPng" title="Export as PNG"><i class="fa-solid fa-file-image"></i></button>
			<button id="btnCopy" title="Copy PNG to clipboard"><i class="fa-solid fa-copy"></i></button>
		</div>

		<div class="group">
			<button id="btnOpen" title="Open file"><i class="fa-solid fa-folder-open"></i></button>
			<button id="btnSave" title="Save file"><i class="fa-solid fa-floppy-disk"></i></button>
			<input  id="fileOpen" type="file" accept=".mmd,.txt" hidden>
		</div>
	</div>
  </div>

  <div id="tabBar">
    <div id="tabList">
      <button id="btnNewTab" title="New tab"><i class="fa-solid fa-plus"></i></button>
    </div>
  </div>

  <div id="splitContainer">
    <div id="editorWrapper">
      <div id="lineNumbers"></div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="templatePicker" class="template-picker hidden">
        <h3>Start with a template or type your own diagram</h3>
        <div class="template-grid">
          <div class="template-card" data-template="flowchart">
            <div class="template-icon">🌊</div>
            <div class="template-name">Flowchart</div>
          </div>
          <div class="template-card" data-template="sequence">
            <div class="template-icon">↔️</div>
            <div class="template-name">Sequence</div>
          </div>
          <div class="template-card" data-template="gantt">
            <div class="template-icon">📅</div>
            <div class="template-name">Gantt</div>
          </div>
          <div class="template-card" data-template="class">
            <div class="template-icon">📦</div>
            <div class="template-name">Class</div>
          </div>
          <div class="template-card" data-template="erDiagram">
            <div class="template-icon">🗃️</div>
            <div class="template-name">ER Diagram</div>
          </div>
          <div class="template-card" data-template="state">
            <div class="template-icon">🔄</div>
            <div class="template-name">State</div>
          </div>
          <div class="template-card" data-template="pie">
            <div class="template-icon">🥧</div>
            <div class="template-name">Pie Chart</div>
          </div>
          <div class="template-card" data-template="gitGraph">
            <div class="template-icon">🌳</div>
            <div class="template-name">Git Graph</div>
          </div>
          <div class="template-card" data-template="journey">
            <div class="template-icon">🗺️</div>
            <div class="template-name">Journey</div>
          </div>
        </div>
        <button id="btnSkipTemplate" class="skip-template">Skip - Start blank</button>
      </div>
    </div>
    <div id="divider"></div>
    <div id="diagram"></div>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
